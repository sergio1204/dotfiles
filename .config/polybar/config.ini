[colors]
background = #272739
background-alt = #2D2D43
foreground = #E5E5E5
primary = #FFAA46
secondary = #8ABEB7
alert = #E84C4C
disabled = #333333
vol = #F8B55F
ram = #F765EC
cpu = #7DD0F5
temp = #F56279
date = #FBC55F
keyboard = #F57CB8
bat = #8DF08D
sep = #919191

[bar/example]
width = 100%
height = 24pt
; radius = 6

dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

; border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.sep}

font-0 = JetBrains Mono:size=10;2
font-1 = FontAwesome6Free:style=Solid:size=10;2
font-2 = FontAwesome6Free:style=Regular:size=10;2
font-3 = FontAwesome6Brands:style=Regular:size=10;2

modules-left = xworkspaces xwindow
modules-right = pulseaudio memory cpu temperature battery date xkeyboard

cursor-click = pointer
; cursor-scroll = ns-resize

enable-ipc = true

tray-position = right

; wm-restack = generic
wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
label-volume = ÔÄ® %percentage%%
label-volume-foreground = ${colors.vol}
label-muted = muted
label-muted-foreground = ${colors.alert}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.keyboard}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
label = Ôāģ %percentage_used:2%%
label-foreground = ${colors.ram}

[module/cpu]
type = internal/cpu
interval = 2
label = Ôčõ %percentage:2%%
label-foreground = ${colors.cpu}

[module/temperature]
type = internal/temperature

; Seconds to sleep between updates
; Default: 1
interval = 5

; Thermal zone to use
; To list all the zone types, run 
; $ for i in /sys/class/thermal/thermal_zone*; do echo "$i: $(<$i/type)"; done
; Default: 0
thermal-zone = 0

; Full path of temperature sysfs path
; Use `sensors` to find preferred temperature source, then run
; $ for i in /sys/class/hwmon/hwmon*/temp*_input; do echo "$(<$(dirname $i)/name): $(cat ${i%_*}_label 2>/dev/null || echo $(basename ${i%_*})) $(readlink -f $i)"; done
; to find path to desired file
; Default reverts to thermal zone setting
hwmon-path = /sys/devices/platform/coretemp.0/hwmon/hwmon2/temp1_input

; Base temperature for where to start the ramp (in degrees celsius)
; Default: 0
;base-temperature = 20

; Threshold temperature to display warning label (in degrees celsius)
; Default: 80
;warn-temperature = 80
label = ÔčČ %temperature-c%
label-foreground = ${colors.temp}

[module/battery]
type = internal/battery

; This is useful in case the battery never reports 100% charge
; Default: 100
;full-at = 99

; format-low once this charge percentage is reached
; Default: 10
; New in version 3.6.0
low-at = 5

; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT0
adapter = ADP0

; If an inotify event haven't been reported in this many
; seconds, manually poll for new values.
;
; Needed as a fallback for systems that don't report events
; on sysfs/procfs.
;
; Disable polling by setting the interval to 0.
;
; Default: 5
poll-interval = 5

label-full = Ôá¶ %percentage%%
label-charging = Ôá¶ %percentage%%
label-discharging = ÔČÄ %percentage%%
label-full-foreground = ${colors.bat}
label-charging-foreground = ${colors.bat}
label-discharging-foreground = ${colors.bat}

[module/date]
type = internal/date
interval = 1
date = ÔĀ≥ %a %d  ÔÄó %H:%M:%S
label = %date%
label-foreground = ${colors.date}

[settings]
screenchange-reload = true
pseudo-transparency = false

; vim:ft=dosini
