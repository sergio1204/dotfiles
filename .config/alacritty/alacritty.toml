[colors]
draw_bold_text_with_bright_colors = true

[colors.bright]
black = "#9bc0f8"
blue = "#8294f5"
cyan = "#5DE1EE"
green = "#5af492"
magenta = "#b683e9"
red = "#ff4d6c"
white = "#c5bcec"
yellow = "#f866ad"

[colors.cursor]
cursor = "#2f8bd0"

[colors.normal]
black = "#23252e"
blue = "#546ef5"
cyan = "#2bd9eb"
green = "#2ce06c"
magenta = "#9058f9"
red = "#ed374b"
white = "#9bf784"
yellow = "#FF7F00"

[colors.primary]
background = "#282c34"
foreground = "#E5E5E5"

[font]
size = 11.0

[font.bold]
family = "BlexMono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "BlexMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "BlexMono Nerd Font"
style = "Italic"

[font.normal]
family = "BlexMono Nerd Font"
style = "Regular"
